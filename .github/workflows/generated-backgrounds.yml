name: Generate Backgrounds JSON

on:
  push:
    paths:
      - 'Images/Backgrounds/**'
      - '.github/workflows/generate-backgrounds.yml'

jobs:

  generate-backgrounds-json:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate backgrounds.json
        run: |

          python3 <<EOF
          import json
          import os

          folder = "Images/Backgrounds"

          files = sorted([
              f for f in os.listdir(folder)
              if os.path.isfile(os.path.join(folder, f))
          ])

          with open("backgrounds.json", "w", encoding="utf-8") as file:
              json.dump(
                  files,
                  file,
                  indent=2,
                  ensure_ascii=False
              )

          print("Generated backgrounds.json")
          EOF

      - name: Commit and push changes
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add backgrounds.json

          git diff --cached --quiet && exit 0

          git commit -m "Auto update backgrounds.json"

          git push
